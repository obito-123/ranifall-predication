<!DOCTYPE html>
<html>
<head>
    <title>SmartStore 🛒</title>
    <link rel="stylesheet" type="text/css" href="{{ url_for('static', filename='css/style.css') }}">
    <style>
        body { font-family: Arial; margin:0; background-color:#f5f5f5; }
        .navbar { background:#111; padding:15px; color:white; display:flex; justify-content:space-between; }
        .navbar a { color:white; text-decoration:none; margin-left:10px; }
        .container { padding:20px; }
        .card { background:white; display:inline-block; width:220px; margin:10px; padding:10px; border-radius:10px; box-shadow:0 4px 10px rgba(0,0,0,0.2); }
        .card img { width:100%; border-radius:10px; }
    </style>
</head>
<body>
    <div class="navbar">
        <h2>🛒 SmartStore</h2>
        <form action="{{ url_for('products') }}" method="get">
            <input type="text" name="search" placeholder="Search products...">
            <button type="submit">Search</button>
        </form>
    </div>
    <div class="container">
        {% block content %}{% endblock %}
    </div>
</body>
</html>
