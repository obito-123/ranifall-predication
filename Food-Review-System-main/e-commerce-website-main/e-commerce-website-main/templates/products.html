{% extends "base.html" %}
{% block content %}
<h2>Products</h2>
{% for p in products %}
<div class="card">
    <img src="{{ url_for('static', filename='images/' + p[5]) }}" alt="{{ p[1] }}">
    <h3>{{ p[1] }}</h3>
    <p>Category: {{ p[4] }}</p>
    <p>💰 Price: ₹{{ dynamic_price(p[2], p[3]) }}</p>
    <p>Stock: {{ p[3] }}</p>
    <a href="{{ url_for('buy', pid=p[0]) }}">Buy Now</a>
</div>
{% endfor %}
{% endblock %}
